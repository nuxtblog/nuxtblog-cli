project_name: nuxtblog

builds:
  - main: ./cmd/nuxtblog
    binary: nuxtblog
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/nuxtblog/nuxtblog-cli/internal/cli.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
